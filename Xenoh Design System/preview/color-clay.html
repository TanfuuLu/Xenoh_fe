<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Palette (clay)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:20px 22px; display:flex; flex-direction:column; gap:12px;}
  .row{display:flex; gap:10px;}
  .sw{flex:1; border-radius:10px; height:74px; padding:10px 12px;
      display:flex; flex-direction:column; justify-content:space-between;
      border:1px solid rgba(90,63,46,.08);
      font-family:var(--font-sans); font-size:11px;}
  .sw b{font-weight:600; font-size:12px; letter-spacing:-0.01em;}
  .sw code{font-family:var(--font-mono); font-size:10.5px; background:transparent; padding:0; color:inherit; opacity:.8;}
  .lead{display:flex; align-items:baseline; gap:10px;}
  .lead h3{font-family:var(--font-display); font-weight:600; font-size:18px; margin:0;}
  .lead span{font-size:12px; color:var(--fg-3);}
  .dark{color:var(--fg-on-clay);}
  .light{color:var(--fg-1);}
</style>
</head>
<body>
<div class="card">
  <div class="lead"><h3>Clay scale</h3><span>Primary brand — action, focus, accent</span></div>
  <div class="row">
    <div class="sw dark" style="background:var(--xn-clay-900)"><b>900</b><code>#6E4F3A</code></div>
    <div class="sw dark" style="background:var(--xn-clay-800)"><b>800</b><code>#8F6F56</code></div>
    <div class="sw dark" style="background:var(--xn-clay-700)"><b>700 ★</b><code>#A98B76</code></div>
    <div class="sw dark" style="background:var(--xn-clay-600)"><b>600</b><code>#BFA28C</code></div>
    <div class="sw light" style="background:var(--xn-clay-500)"><b>500</b><code>#D6BFA9</code></div>
    <div class="sw light" style="background:var(--xn-clay-400)"><b>400</b><code>#E6D4C1</code></div>
    <div class="sw light" style="background:var(--xn-clay-300)"><b>300</b><code>#F1E3D1</code></div>
    <div class="sw light" style="background:var(--xn-clay-200)"><b>200 ★</b><code>#F3E4C9</code></div>
    <div class="sw light" style="background:var(--xn-clay-100)"><b>100</b><code>#FAF1E0</code></div>
    <div class="sw light" style="background:var(--xn-clay-050)"><b>050</b><code>#FDF8EF</code></div>
  </div>
</div>
</body></html>
