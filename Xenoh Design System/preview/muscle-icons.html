<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Muscle icons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 26px;}
  h4{font-family:var(--font-sans); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3); margin:0 0 14px;}
  .grid{display:grid; grid-template-columns:repeat(6,1fr); gap:10px;}
  .tile{display:flex; flex-direction:column; align-items:center; gap:6px; padding:10px 6px;
        background:var(--bg-2); border:1px solid var(--border-1); border-radius:12px;
        color:var(--fg-1);}
  .tile img{width:28px; height:28px; opacity:0.9;}
  .tile span{font-family:var(--font-sans); font-size:11.5px; color:var(--fg-2); font-weight:500;}
</style>
</head>
<body>
<div class="wrap">
  <h4>Custom muscle glyphs · 1.5px stroke</h4>
  <div class="grid">
    <div class="tile"><img src="../assets/icons/muscle/chest.svg"/><span>Chest</span></div>
    <div class="tile"><img src="../assets/icons/muscle/back.svg"/><span>Back</span></div>
    <div class="tile"><img src="../assets/icons/muscle/shoulders.svg"/><span>Shoulders</span></div>
    <div class="tile"><img src="../assets/icons/muscle/biceps.svg"/><span>Biceps</span></div>
    <div class="tile"><img src="../assets/icons/muscle/triceps.svg"/><span>Triceps</span></div>
    <div class="tile"><img src="../assets/icons/muscle/forearms.svg"/><span>Forearms</span></div>
    <div class="tile"><img src="../assets/icons/muscle/core.svg"/><span>Core</span></div>
    <div class="tile"><img src="../assets/icons/muscle/quadriceps.svg"/><span>Quads</span></div>
    <div class="tile"><img src="../assets/icons/muscle/hamstrings.svg"/><span>Hamstrings</span></div>
    <div class="tile"><img src="../assets/icons/muscle/glutes.svg"/><span>Glutes</span></div>
    <div class="tile"><img src="../assets/icons/muscle/calves.svg"/><span>Calves</span></div>
    <div class="tile"><img src="../assets/icons/muscle/fullbody.svg"/><span>Full body</span></div>
  </div>
</div>
</body></html>
