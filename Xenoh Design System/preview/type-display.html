<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Display type</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:24px 26px;}
  .sample{font-family:var(--font-display); font-weight:700; font-size:72px; line-height:1.02;
          letter-spacing:-0.02em; color:var(--fg-1); margin:0 0 10px;}
  .sub{font-family:var(--font-display); font-weight:500; font-size:28px; line-height:1.1;
       color:var(--fg-2); margin:0 0 14px;}
  .meta{font-family:var(--font-mono); font-size:11.5px; color:var(--fg-3);}
  .row{display:flex; justify-content:space-between; gap:24px; align-items:flex-end;}
</style>
</head>
<body>
<div class="card">
  <h1 class="sample">Plan the work. Then do it.</h1>
  <p class="sub">Namdhinggo — display serif, tight tracking.</p>
  <div class="row">
    <div class="meta">Namdhinggo · 72 / 80 · 700 · tracking -0.02em</div>
    <div class="meta">weights loaded: 400 · 500 · 600 · 700 · 800</div>
  </div>
</div>
</body></html>
