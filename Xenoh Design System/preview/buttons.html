<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:22px 26px; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; gap:10px; align-items:center; flex-wrap:wrap;}
  .btn{font-family:var(--font-sans); font-weight:500; font-size:14px; padding:10px 18px;
       border-radius:999px; border:1px solid transparent; cursor:pointer;
       display:inline-flex; align-items:center; gap:8px; line-height:1;
       transition:all var(--dur-fast) var(--ease-out);}
  .btn.primary{background:var(--accent); color:var(--fg-on-clay); box-shadow:var(--sh-sm), var(--sh-inset);}
  .btn.primary:hover{background:var(--accent-hover);}
  .btn.secondary{background:var(--bg-2); color:var(--fg-1); border-color:var(--border-1);}
  .btn.secondary:hover{background:var(--bg-3);}
  .btn.ghost{background:transparent; color:var(--fg-1);}
  .btn.ghost:hover{background:var(--bg-3);}
  .btn.danger{background:var(--xn-danger); color:#fbf6ea;}
  .btn.sm{font-size:13px; padding:7px 13px;}
  .btn.lg{font-size:15px; padding:13px 22px;}
  .btn:disabled{color:var(--fg-4); background:var(--bg-3); border-color:var(--border-1); cursor:not-allowed; box-shadow:none;}
  h4{font-family:var(--font-sans); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3); margin:0;}
</style>
</head>
<body>
<div class="card">
  <h4>Buttons</h4>
  <div class="row">
    <button class="btn primary">Start a week</button>
    <button class="btn secondary">Save draft</button>
    <button class="btn ghost">Cancel</button>
    <button class="btn danger">Remove client</button>
    <button class="btn primary" disabled>Disabled</button>
  </div>
  <div class="row">
    <button class="btn primary sm">Log set</button>
    <button class="btn primary">Log set</button>
    <button class="btn primary lg">Log set</button>
  </div>
</div>
</body></html>
