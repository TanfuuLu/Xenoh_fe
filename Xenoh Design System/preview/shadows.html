<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:26px 28px; background:var(--bg-1);}
  h4{font-family:var(--font-sans); font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--fg-3); margin:0 0 18px;}
  .row{display:flex; gap:18px;}
  .box{width:104px; height:72px; border-radius:14px; background:var(--xn-paper);
       border:1px solid var(--border-1);
       display:flex; align-items:center; justify-content:center;
       font-family:var(--font-sans); font-size:12px; color:var(--fg-2); font-weight:500;}
  .col{display:flex; flex-direction:column; align-items:center; gap:8px;}
  .name{font-family:var(--font-sans); font-size:11.5px; color:var(--fg-2); font-weight:600;}
</style>
</head>
<body>
<div class="card">
  <h4>Shadows · warm-tinted only</h4>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--sh-xs)">xs</div><div class="name">--sh-xs</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--sh-sm)">sm</div><div class="name">--sh-sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--sh-md)">md</div><div class="name">--sh-md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--sh-lg)">lg</div><div class="name">--sh-lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--sh-xl)">xl</div><div class="name">--sh-xl</div></div>
  </div>
</div>
</body></html>
