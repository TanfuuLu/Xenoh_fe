<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Client row</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .wrap{padding:20px 26px; display:flex; flex-direction:column; gap:10px;}
  .row{display:grid; grid-template-columns:auto 1fr auto auto; align-items:center; gap:14px;
       padding:12px 14px; background:var(--xn-paper); border:1px solid var(--border-1); border-radius:12px;}
  .av{width:40px; height:40px; border-radius:999px; background:var(--xn-clay-300); color:var(--xn-clay-900);
      font-family:var(--font-display); font-weight:700; font-size:16px;
      display:flex; align-items:center; justify-content:center;}
  .av.sage{background:var(--xn-sage-300); color:#4a5226;}
  .name{font-family:var(--font-sans); font-weight:600; font-size:14.5px; color:var(--fg-1);}
  .meta{font-family:var(--font-sans); font-size:12px; color:var(--fg-3); margin-top:2px;}
  .chip{font-family:var(--font-sans); font-weight:500; font-size:11.5px;
        padding:4px 10px; border-radius:999px;}
  .chip.ok{background:var(--xn-sage-200); color:#5d6635;}
  .chip.pending{background:var(--xn-warning-bg); color:#8a5a1f;}
  .stat{font-family:var(--font-mono); font-size:13px; color:var(--fg-2); font-variant-numeric:tabular-nums;}
</style>
</head>
<body>
<div class="wrap">
  <div class="row">
    <div class="av">MA</div>
    <div><div class="name">Marco Aliaga</div><div class="meta">Push/pull/legs · week 3 of 8</div></div>
    <div class="stat">18 / 24 sessions</div>
    <span class="chip ok">Active</span>
  </div>
  <div class="row">
    <div class="av sage">JS</div>
    <div><div class="name">Jun Soh</div><div class="meta">Strength block · week 1 of 6</div></div>
    <div class="stat">3 / 18</div>
    <span class="chip pending">Pending invite</span>
  </div>
</div>
</body></html>
