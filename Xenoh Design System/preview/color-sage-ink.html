<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Xenoh — Palette (sage + ink)</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  html,body{margin:0;background:var(--bg-1);}
  .card{padding:20px 22px; display:flex; flex-direction:column; gap:14px;}
  .row{display:flex; gap:10px;}
  .sw{flex:1; border-radius:10px; height:64px; padding:9px 10px;
      display:flex; flex-direction:column; justify-content:space-between;
      border:1px solid rgba(90,63,46,.08);
      font-family:var(--font-sans); font-size:11px;}
  .sw b{font-weight:600; font-size:12px;}
  .sw code{font-family:var(--font-mono); font-size:10.5px; background:transparent; padding:0; color:inherit; opacity:.8;}
  .lead{display:flex; align-items:baseline; gap:10px;}
  .lead h3{font-family:var(--font-display); font-weight:600; font-size:16px; margin:0;}
  .lead span{font-size:11.5px; color:var(--fg-3);}
  .dark{color:var(--fg-on-clay);} .light{color:var(--fg-1);}
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="lead"><h3>Sage — accent + success</h3><span>progress, completion, "logged"</span></div>
    <div class="row" style="margin-top:8px">
      <div class="sw dark" style="background:var(--xn-sage-700)"><b>700</b><code>#8B9169</code></div>
      <div class="sw dark" style="background:var(--xn-sage-600)"><b>600</b><code>#A3A97C</code></div>
      <div class="sw light" style="background:var(--xn-sage-500)"><b>500 ★</b><code>#BABF94</code></div>
      <div class="sw light" style="background:var(--xn-sage-400)"><b>400</b><code>#C9CEAB</code></div>
      <div class="sw light" style="background:var(--xn-sage-300)"><b>300</b><code>#DDE0C3</code></div>
      <div class="sw light" style="background:var(--xn-sage-200)"><b>200</b><code>#EAECD6</code></div>
    </div>
  </div>
  <div>
    <div class="lead"><h3>Ink — warm neutrals</h3><span>text + borders — never true grey</span></div>
    <div class="row" style="margin-top:8px">
      <div class="sw dark" style="background:var(--xn-ink-900)"><b>900</b><code>#2A1F17</code></div>
      <div class="sw dark" style="background:var(--xn-ink-700)"><b>700</b><code>#5C4A3C</code></div>
      <div class="sw dark" style="background:var(--xn-ink-500)"><b>500</b><code>#998777</code></div>
      <div class="sw light" style="background:var(--xn-ink-300)"><b>300</b><code>#D4C8B8</code></div>
      <div class="sw light" style="background:var(--xn-ink-100)"><b>100</b><code>#F4EDE0</code></div>
      <div class="sw light" style="background:var(--xn-paper); border-color:var(--border-1)"><b>Paper</b><code>#FBF7EE</code></div>
    </div>
  </div>
</div>
</body></html>
